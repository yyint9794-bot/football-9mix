# အဟောင်း — app-web-release.yml သုံးပါ (workflow_dispatch သာ လက်ရှိထိ)
name: Build Android APK (legacy)

on:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: chmod +x android/gradlew
      - run: npm ci
      - run: npm run android:apk
      - run: node scripts/sync-web-download.mjs
