name: Deploy site files

concurrency:
  group: deploy-site
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/app-version.json'
      - 'public/downloads/**'
      - 'public/_redirects'
      - 'public/_headers'
      - 'src/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'

jobs:
  deploy-site:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.head_commit == null ||
      !contains(github.event.head_commit.message, '[skip apk-build]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify app-version in dist
        run: |
          node -e "
          const fs = require('fs');
          const gradle = fs.readFileSync('android/app/build.gradle','utf8');
          const min = Number(/versionCode\\s+(\\d+)/.exec(gradle)?.[1] ?? 0);
          const j = JSON.parse(fs.readFileSync('dist/app-version.json','utf8'));
          console.log('dist app-version:', j.versionCode, j.versionName, '(gradle min', min + ')');
          if (j.versionCode < min) { console.error('dist version behind build.gradle'); process.exit(1); }
          "

      - name: Deploy to Cloudflare Pages
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=football-9mix
