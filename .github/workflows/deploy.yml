name: Deploy site and APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip apk-build]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web + Android APK
        run: npm run android:apk

      - name: Commit APK and web download sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_CODE=$(node -p "Number(/versionCode\\s+(\\d+)/.exec(require('fs').readFileSync('android/app/build.gradle','utf8'))?.[1] ?? 0)")
          OLD_CODE=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('public/app-version.json','utf8')).versionCode)}catch(e){console.log(0)}")
          if [ "$NEW_CODE" -lt "$OLD_CODE" ]; then
            echo "Refuse to downgrade app version $OLD_CODE -> $NEW_CODE"
            exit 1
          fi
          git add public/downloads/9mix-football.apk public/app-version.json src/native/publishedVersion.ts src/appDownload.ts functions/_generated/appVersion.mjs
          if git diff --staged --quiet; then
            echo "No APK or version file changes to commit."
          else
            git commit -m "ci: sync APK v${NEW_CODE} and web download [skip apk-build]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=football-9mix
