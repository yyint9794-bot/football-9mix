# Web သာ — app-version.json / UI အသစ် (APK build မစောင့်)
name: Deploy web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify dist/app-version.json
        run: node -e "const v=require('./dist/app-version.json'); console.log('versionCode', v.versionCode); if (v.versionCode < 15) process.exit(1)"

      - name: Deploy to Cloudflare Pages
        run: node scripts/deploy-pages.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
