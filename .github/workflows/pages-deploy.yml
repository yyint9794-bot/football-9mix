# Web သာ — app-version.json / UI အသစ် (APK build မစောင့်)
name: Deploy web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify dist/app-version.json
        run: |
          node -e "const v=require('./dist/app-version.json'); console.log('dist versionCode', v.versionCode); if (v.versionCode < 15) process.exit(1)"

      - name: Require Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::GitHub → Settings → Secrets → Actions: CLOUDFLARE_API_TOKEN မထည့်ရသေး"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret မထည့်ရသေး"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Cloudflare whoami
        run: npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy dist → Cloudflare Pages
        run: >
          npx wrangler pages deploy dist
          --project-name=football-9mix
          --branch=main
          --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
