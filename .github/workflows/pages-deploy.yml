# Web သာ — app-version.json / UI အသစ် (APK build မစောင့်)
name: Deploy web to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy dist → Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=football-9mix
