# APK → Cloudflare R2 (ဒေါင်းလုဒ် "APK not found" ပြင်ရန်)
name: Upload APK to R2

on:
  workflow_dispatch:

concurrency:
  group: upload-apk-r2
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - run: chmod +x android/gradlew
      - run: npm ci

      - name: Build APK
        run: npm run android:apk

      - name: Ensure Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node -e "const t=(process.env.CLOUDFLARE_API_TOKEN||'').trim();const a=(process.env.CLOUDFLARE_ACCOUNT_ID||'').trim();if(!t||!a)throw new Error('Missing CLOUDFLARE secrets');if(t.includes('curl')||t.includes('http'))throw new Error('Put cfut_ token only, not curl');if(!/^[a-f0-9]{32}$/i.test(a))throw new Error('CLOUDFLARE_ACCOUNT_ID must be 32 hex');console.log('Secrets OK, token length',t.length);"

      - name: Upload to Cloudflare R2 (wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/upload-apk-r2.mjs

      - name: Upload to R2 (S3 API fallback)
        if: failure()
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node scripts/upload-apk-r2-s3.mjs

      - name: Verify download URL
        run: |
          sleep 5
          code=$(curl -sI -o /dev/null -w "%{http_code}" "https://ballpwal.org/downloads/9mix-football-v15.apk" || echo "000")
          echo "HTTP $code for /downloads/9mix-football-v15.apk"
          if [ "$code" != "200" ]; then
            echo "::warning::APK URL not 200 yet — Pages binding APK_BUCKET → 9mix-football-apk စစ်ပါ"
          fi
