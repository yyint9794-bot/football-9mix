<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <meta
      name="description"
      content="A premium football match and live stream companion powered by Htay API."
    />
    <link rel="preconnect" href="https://sta.vnres.co" crossorigin />
    <link rel="preconnect" href="https://assets.b365api.com" crossorigin />
    <link rel="dns-prefetch" href="https://sta.vnres.co" />
    <link rel="dns-prefetch" href="https://assets.b365api.com" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>Football Stream Hub</title>
  </head>
  <body>
    <div id="root">
      <p id="boot-loading" style="margin:2rem;font-family:system-ui,sans-serif;color:#8aa0b8;text-align:center">
        App ဖွင့်နေပါတယ်…
      </p>
    </div>
    <script>
      setTimeout(function () {
        var el = document.getElementById('boot-loading');
        if (!el || !el.parentNode) return;
        el.innerHTML =
          'App မတက်သေးပါ — Cache ရှင်းပြီး refresh လုပ်ပါ<br><small style="color:#64748b">Chrome → Site settings → Clear data</small>';
        el.style.color = '#b91c1c';
      }, 12000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
