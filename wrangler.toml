name = "football-9mix"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# KV (Admin + User login)
[[kv_namespaces]]
binding = "WALLET_KV"
id = "bc9dd5cfce4b44d397e7c127bf418853"

# APK ဒေါင်းလုဒ် (GitHub မသုံး — R2 မှာ သိမ်း)
[[r2_buckets]]
binding = "APK_BUCKET"
bucket_name = "9mix-football-apk"

# Pages Functions runtime (plain text). Password → Dashboard Secret only.
[vars]
STREAM_REFERER = "https://ballpwal.org/"
WALLET_ADMIN_USER = "admin"
WALLET_KPAY_NUMBER = "09674646102"
WALLET_WAVE_NUMBER = "09674646102"
